        <rect x="362" y="744" width="330" height="120" rx="14" fill="rgba(120,53,15,0.35)" stroke="#fbbf24" stroke-width="1.6"/>
        <text x="378" y="770" fill="#e5eefb" font-size="15" font-weight="700">External stack + libraries</text>
