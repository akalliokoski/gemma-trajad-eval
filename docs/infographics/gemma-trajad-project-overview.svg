        <text x="280" y="436" fill="#e5eefb" font-size="15" font-weight="700">dataset_builder/</text>
        <text x="280" y="458" fill="#94a3b8" font-size="10">download_hermes.py</text>
        <text x="280" y="476" fill="#94a3b8" font-size="10">normalize_trajectory.py</text>
        <text x="280" y="494" fill="#94a3b8" font-size="10">perturbations.py</text>
        <text x="280" y="512" fill="#94a3b8" font-size="10">validate_labels.py</text>
        <text x="280" y="530" fill="#94a3b8" font-size="10">build_trajad_dataset.py</text>
        <text x="280" y="560" fill="#e5eefb" font-size="11">Builds normal + anomalous variants</text>

        <rect x="506" y="390" width="236" height="210" rx="14" fill="rgba(76,29,149,0.40)" stroke="#a78bfa" stroke-width="1.6"/>
        <text x="522" y="416" fill="#e5eefb" font-size="15" font-weight="700">Data artifacts</text>
        <text x="522" y="442" fill="#e5eefb" font-size="11">raw/hermes_filtered.jsonl</text>
        <text x="522" y="462" fill="#e5eefb" font-size="11">interim/hermes_filtered.normalized.jsonl</text>
        <text x="522" y="490" fill="#e5eefb" font-size="11">processed/train.jsonl → 13,767</text>
        <text x="522" y="510" fill="#e5eefb" font-size="11">processed/dev.jsonl → 1,833</text>
        <text x="522" y="530" fill="#e5eefb" font-size="11">processed/test.jsonl → 2,755</text>
        <text x="522" y="560" fill="#94a3b8" font-size="10">Split by source_trace_id to avoid leakage</text>

        <rect x="779" y="410" width="220" height="170" rx="14" fill="rgba(6,78,59,0.40)" stroke="#34d399" stroke-width="1.6"/>
        <text x="795" y="436" fill="#e5eefb" font-size="15" font-weight="700">training/prepare_sft_data.py</text>
        <text x="795" y="462" fill="#e5eefb" font-size="11">Task modes:</text>
        <text x="795" y="482" fill="#94a3b8" font-size="10">binary</text>
        <text x="795" y="500" fill="#94a3b8" font-size="10">localize</text>
        <text x="795" y="518" fill="#94a3b8" font-size="10">joint</text>
        <text x="795" y="550" fill="#e5eefb" font-size="11">Wraps trajectories into chat SFT format</text>

        <rect x="1036" y="390" width="216" height="210" rx="14" fill="rgba(6,78,59,0.40)" stroke="#34d399" stroke-width="1.6"/>
        <text x="1052" y="416" fill="#e5eefb" font-size="15" font-weight="700">Model training</text>
        <text x="1052" y="442" fill="#e5eefb" font-size="11">train_e2b.py</text>
        <text x="1052" y="460" fill="#94a3b8" font-size="10">Gemma 4 E2B-it + LoRA</text>
        <text x="1052" y="478" fill="#94a3b8" font-size="10">mlx-tune API, Unsloth-compatible style</text>
        <text x="1052" y="502" fill="#e5eefb" font-size="11">train_e4b.py</text>
        <text x="1052" y="520" fill="#94a3b8" font-size="10">optional larger comparison run</text>
        <text x="1052" y="548" fill="#e5eefb" font-size="11">Outputs adapters under outputs/adapters/</text>

        <rect x="1288" y="410" width="160" height="170" rx="14" fill="rgba(6,78,59,0.40)" stroke="#34d399" stroke-width="1.6"/>
        <text x="1304" y="436" fill="#e5eefb" font-size="15" font-weight="700">Evaluate</text>
        <text x="1304" y="460" fill="#94a3b8" font-size="10">inference.py</text>
        <text x="1304" y="478" fill="#94a3b8" font-size="10">evaluate.py</text>
        <text x="1304" y="504" fill="#e5eefb" font-size="11">Metrics:</text>
        <text x="1304" y="522" fill="#94a3b8" font-size="10">T1 binary</text>
        <text x="1304" y="540" fill="#94a3b8" font-size="10">T2 bad-step localization</text>
        <text x="1304" y="558" fill="#94a3b8" font-size="10">T3 anomaly-type classification</text>

        <line x1="227" y1="495" x2="264" y2="495" stroke="#34d399" stroke-width="2.2" marker-end="url(#arrowGreen)"/>
        <line x1="469" y1="495" x2="506" y2="495" stroke="#34d399" stroke-width="2.2" marker-end="url(#arrowGreen)"/>
