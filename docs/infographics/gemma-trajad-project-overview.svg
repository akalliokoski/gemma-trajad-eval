        <rect x="24" y="694" width="1452" height="204" rx="18" fill="none" stroke="#334155" stroke-dasharray="8 6"/>
        <text x="40" y="718" fill="#a78bfa" font-size="14" font-weight="700">3) Surrounding project systems: docs, integrations, guardrails</text>

        <rect x="44" y="744" width="280" height="120" rx="14" fill="rgba(8,51,68,0.40)" stroke="#22d3ee" stroke-width="1.6"/>
