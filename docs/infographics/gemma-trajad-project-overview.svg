        <text x="60" y="794" fill="#94a3b8" font-size="10">README.md, AGENTS.md, docs/project-spec.md,</text>
        <text x="60" y="812" fill="#94a3b8" font-size="10">docs/evaluation-plan.md, docs/execution-topology.md,</text>
        <text x="60" y="830" fill="#94a3b8" font-size="10">docs/plans/, repo-local wiki/</text>
