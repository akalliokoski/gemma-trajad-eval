<svg viewBox="0 0 1500 930" width="100%" role="img" aria-label="Architecture and workflow infographic for gemma-trajad-eval">
        <defs>
          <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"></path>
          </marker>
          <marker id="arrowGreen" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#34d399"></path>
          </marker>
          <marker id="arrowAmber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#fbbf24"></path>
          </marker>
        </defs>

        <rect x="0" y="0" width="1500" height="930" rx="24" fill="#08101f" stroke="#1e293b"/>
        <text x="28" y="34" fill="#e5eefb" font-size="22" font-weight="700">Architecture + workflow</text>
        <text x="28" y="58" fill="#94a3b8" font-size="11">From Hermes traces to training-ready datasets, local-first fine-tuning, evaluation, and observability demos</text>

        <rect x="24" y="86" width="1452" height="230" rx="18" fill="none" stroke="#334155" stroke-dasharray="8 6"/>
        <text x="40" y="110" fill="#22d3ee" font-size="14" font-weight="700">1) Control plane and execution topology</text>

        <rect x="44" y="132" width="390" height="150" rx="14" fill="rgba(8,51,68,0.40)" stroke="#22d3ee" stroke-width="1.6"/>
        <text x="62" y="156" fill="#e5eefb" font-size="16" font-weight="700">VPS / Hermes control plane</text>
        <text x="62" y="178" fill="#94a3b8" font-size="11">Where Hermes runs by default</text>
        <text x="62" y="204" fill="#e5eefb" font-size="11">• planning, docs, repo management</text>
        <text x="62" y="224" fill="#e5eefb" font-size="11">• wiki maintenance and lightweight automation</text>
        <text x="62" y="244" fill="#e5eefb" font-size="11">• remote coordination and orchestration</text>
        <text x="62" y="264" fill="#e5eefb" font-size="11">• prepares tasks for Mac / future Modal</text>

        <rect x="555" y="132" width="390" height="150" rx="14" fill="rgba(6,78,59,0.40)" stroke="#34d399" stroke-width="1.6"/>
        <text x="573" y="156" fill="#e5eefb" font-size="16" font-weight="700">Apple Silicon MacBook Pro</text>
        <text x="573" y="178" fill="#94a3b8" font-size="11">Primary small/medium compute worker</text>
        <text x="573" y="204" fill="#e5eefb" font-size="11">• bounded Gemma experiments via mlx-tune</text>
        <text x="573" y="224" fill="#e5eefb" font-size="11">• local data processing + Apple Silicon validation</text>
        <text x="573" y="244" fill="#e5eefb" font-size="11">• workstation constraints respected</text>
        <text x="573" y="264" fill="#fb7185" font-size="11">• high-RAM dispatch requires user approval</text>

        <rect x="1066" y="132" width="370" height="150" rx="14" fill="rgba(120,53,15,0.35)" stroke="#fbbf24" stroke-width="1.6"/>
        <text x="1084" y="156" fill="#e5eefb" font-size="16" font-weight="700">Modal (future heavy tier)</text>
        <text x="1084" y="178" fill="#94a3b8" font-size="11">Deferred until the project needs real GPU scale</text>
        <text x="1084" y="204" fill="#e5eefb" font-size="11">• large training runs</text>
        <text x="1084" y="224" fill="#e5eefb" font-size="11">• heavy batch inference</text>
        <text x="1084" y="244" fill="#e5eefb" font-size="11">• jobs too disruptive for the Mac</text>

        <line x1="434" y1="208" x2="555" y2="208" stroke="#94a3b8" stroke-width="2.2" marker-end="url(#arrow)"/>
        <line x1="945" y1="208" x2="1066" y2="208" stroke="#fbbf24" stroke-width="2.2" stroke-dasharray="7 6" marker-end="url(#arrowAmber)"/>
        <text x="456" y="194" fill="#94a3b8" font-size="10">Tailscale + Syncthing aware coordination</text>
        <text x="957" y="194" fill="#fbbf24" font-size="10">future escalation path</text>

        <rect x="24" y="340" width="1452" height="330" rx="18" fill="none" stroke="#334155" stroke-dasharray="8 6"/>
        <text x="40" y="364" fill="#34d399" font-size="14" font-weight="700">2) Core data and model pipeline</text>

        <rect x="42" y="410" width="185" height="170" rx="14" fill="rgba(120,53,15,0.35)" stroke="#fbbf24" stroke-width="1.6"/>
        <text x="58" y="436" fill="#e5eefb" font-size="15" font-weight="700">Sources</text>
        <text x="58" y="460" fill="#e5eefb" font-size="11">HF dataset:</text>
        <text x="58" y="478" fill="#94a3b8" font-size="10">DJLougen/hermes-agent-traces-filtered</text>
        <text x="58" y="500" fill="#e5eefb" font-size="11">Optional:</text>
        <text x="58" y="518" fill="#94a3b8" font-size="10">lambda/hermes-agent-reasoning-traces</text>
        <text x="58" y="550" fill="#e5eefb" font-size="11">Current local raw cache:</text>
        <text x="58" y="568" fill="#fbbf24" font-size="14" font-weight="700">3,679 traces</text>

