<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="2400" viewBox="0 0 1600 2400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1600" height="2400" fill="url(#bg)"/>
  <rect x="70" y="60" width="1460" height="2280" rx="42" fill="#0b1220" opacity="0.45" stroke="#334155"/>

  <text x="110" y="150" fill="#93c5fd" font-size="34" font-family="Inter,Arial,sans-serif" font-weight="700">DATASET BUILDER • PHASE 0.1 • DOMAIN BACKGROUND</text>
  <text x="110" y="225" fill="#f8fafc" font-size="70" font-family="Inter,Arial,sans-serif" font-weight="800">Trajectory anomaly detection for LLM agents</text>
  <text x="110" y="285" fill="#cbd5e1" font-size="30" font-family="Inter,Arial,sans-serif">Why TrajAD matters, how it differs from GPS anomaly detection, and what perturb-and-complete adds.</text>

  <rect x="110" y="340" width="1380" height="250" rx="28" fill="#111827" stroke="#1e293b" filter="url(#shadow)"/>
  <rect x="110" y="340" width="18" height="250" rx="9" fill="url(#accent)"/>
  <text x="150" y="410" fill="#67e8f9" font-size="28" font-family="Inter,Arial,sans-serif" font-weight="700">1. What is the trajectory here?</text>
  <text x="150" y="470" fill="#f8fafc" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="800">A task-execution trace, not a physical path</text>
  <text x="150" y="530" fill="#cbd5e1" font-size="29" font-family="Inter,Arial,sans-serif">Instruction + reasoning + actions + observations across time</text>
  <g transform="translate(150,555)">
    <rect x="0" y="0" width="220" height="70" rx="18" fill="#1d4ed8"/>
    <text x="60" y="44" fill="#eff6ff" font-size="28" font-family="Inter,Arial,sans-serif" font-weight="700">Task</text>
    <path d="M220 35 L300 35" stroke="#38bdf8" stroke-width="8" stroke-linecap="round"/>
    <rect x="300" y="0" width="220" height="70" rx="18" fill="#0f766e"/>
    <text x="345" y="44" fill="#ecfeff" font-size="28" font-family="Inter,Arial,sans-serif" font-weight="700">Reason</text>
    <path d="M520 35 L600 35" stroke="#38bdf8" stroke-width="8" stroke-linecap="round"/>
    <rect x="600" y="0" width="220" height="70" rx="18" fill="#7c3aed"/>
    <text x="652" y="44" fill="#f5f3ff" font-size="28" font-family="Inter,Arial,sans-serif" font-weight="700">Act</text>
    <path d="M820 35 L900 35" stroke="#38bdf8" stroke-width="8" stroke-linecap="round"/>
    <rect x="900" y="0" width="260" height="70" rx="18" fill="#b45309"/>
    <text x="940" y="44" fill="#fff7ed" font-size="28" font-family="Inter,Arial,sans-serif" font-weight="700">Observe</text>
  </g>

  <rect x="110" y="640" width="1380" height="520" rx="28" fill="#111827" stroke="#1e293b" filter="url(#shadow)"/>
  <text x="150" y="715" fill="#67e8f9" font-size="28" font-family="Inter,Arial,sans-serif" font-weight="700">2. Agent trajectories vs. GPS trajectories</text>
  <rect x="150" y="760" width="620" height="340" rx="24" fill="#0f172a" stroke="#334155"/>
  <rect x="830" y="760" width="620" height="340" rx="24" fill="#0f172a" stroke="#334155"/>
  <text x="190" y="820" fill="#f8fafc" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="800">GPS anomaly detection</text>
  <text x="870" y="820" fill="#f8fafc" font-size="42" font-family="Inter,Arial,sans-serif" font-weight="800">Agent anomaly detection</text>
  <text x="190" y="885" fill="#cbd5e1" font-size="28" font-family="Inter,Arial,sans-serif">• Path through physical space</text>
  <text x="190" y="935" fill="#cbd5e1" font-size="28" font-family="Inter,Arial,sans-serif">• Points, staypoints, durations</text>
  <text x="190" y="985" fill="#cbd5e1" font-size="28" font-family="Inter,Arial,sans-serif">• Looks for unusual routes or movement</text>
  <text x="190" y="1035" fill="#cbd5e1" font-size="28" font-family="Inter,Arial,sans-serif">• Often scores whole trajectories or points</text>
  <text x="870" y="885" fill="#cbd5e1" font-size="28" font-family="Inter,Arial,sans-serif">• Path through task execution</text>
  <text x="870" y="935" fill="#cbd5e1" font-size="28" font-family="Inter,Arial,sans-serif">• Reasoning, tool calls, observations</text>
  <text x="870" y="985" fill="#cbd5e1" font-size="28" font-family="Inter,Arial,sans-serif">• Looks for process failures and bad decisions</text>
  <text x="870" y="1035" fill="#cbd5e1" font-size="28" font-family="Inter,Arial,sans-serif">• Must localize the first bad step</text>
  <rect x="150" y="1080" width="1300" height="52" rx="20" fill="#0b1220"/>
  <text x="190" y="1115" fill="#fcd34d" font-size="26" font-family="Inter,Arial,sans-serif" font-weight="700">Key distinction:</text>
  <text x="400" y="1115" fill="#e2e8f0" font-size="26" font-family="Inter,Arial,sans-serif">GPS anomalies are spatial outliers; agent anomalies are semantic/procedural failures.</text>

  <rect x="110" y="1210" width="1380" height="480" rx="28" fill="#111827" stroke="#1e293b" filter="url(#shadow)"/>
  <text x="150" y="1285" fill="#67e8f9" font-size="28" font-family="Inter,Arial,sans-serif" font-weight="700">3. Why first-error localization matters</text>
  <text x="150" y="1350" fill="#f8fafc" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="800">Detect + localize → rollback + retry</text>
  <path d="M170 1450 L480 1450" stroke="#38bdf8" stroke-width="12" stroke-linecap="round"/>
  <path d="M540 1450 L850 1450" stroke="#38bdf8" stroke-width="12" stroke-linecap="round"/>
  <path d="M910 1450 L1220 1450" stroke="#38bdf8" stroke-width="12" stroke-linecap="round"/>
  <circle cx="170" cy="1450" r="34" fill="#1d4ed8"/><text x="150" y="1462" fill="#eff6ff" font-size="26" font-family="Inter,Arial,sans-serif" font-weight="800">1</text>
  <circle cx="480" cy="1450" r="34" fill="#0f766e"/><text x="460" y="1462" fill="#ecfeff" font-size="26" font-family="Inter,Arial,sans-serif" font-weight="800">2</text>
  <circle cx="850" cy="1450" r="34" fill="#dc2626"/><text x="830" y="1462" fill="#fff1f2" font-size="26" font-family="Inter,Arial,sans-serif" font-weight="800">3</text>
  <circle cx="1220" cy="1450" r="34" fill="#7c3aed"/><text x="1200" y="1462" fill="#f5f3ff" font-size="26" font-family="Inter,Arial,sans-serif" font-weight="800">4</text>
  <text x="120" y="1530" fill="#cbd5e1" font-size="26" font-family="Inter,Arial,sans-serif">Normal execution</text>
  <text x="410" y="1530" fill="#cbd5e1" font-size="26" font-family="Inter,Arial,sans-serif">Verifier spots anomaly</text>
  <text x="770" y="1530" fill="#fca5a5" font-size="26" font-family="Inter,Arial,sans-serif">First bad step</text>
  <text x="1110" y="1530" fill="#cbd5e1" font-size="26" font-family="Inter,Arial,sans-serif">Rollback to step 2 and retry</text>
  <text x="150" y="1620" fill="#e2e8f0" font-size="28" font-family="Inter,Arial,sans-serif">TrajAD is about runtime auditing, not just judging the final answer after everything already went wrong.</text>

  <rect x="110" y="1740" width="1380" height="430" rx="28" fill="#111827" stroke="#1e293b" filter="url(#shadow)"/>
  <text x="150" y="1815" fill="#67e8f9" font-size="28" font-family="Inter,Arial,sans-serif" font-weight="700">4. How TrajBench is built</text>
  <text x="150" y="1880" fill="#f8fafc" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="800">Perturb-and-complete, not just perturb</text>
  <rect x="150" y="1930" width="360" height="160" rx="22" fill="#1e293b"/>
  <rect x="620" y="1930" width="360" height="160" rx="22" fill="#1e293b"/>
  <rect x="1090" y="1930" width="360" height="160" rx="22" fill="#1e293b"/>
  <text x="185" y="1988" fill="#e0f2fe" font-size="30" font-family="Inter,Arial,sans-serif" font-weight="800">Step 1</text>
  <text x="185" y="2035" fill="#cbd5e1" font-size="26" font-family="Inter,Arial,sans-serif">Start from a clean, successful agent trajectory.</text>
  <text x="655" y="1988" fill="#e0f2fe" font-size="30" font-family="Inter,Arial,sans-serif" font-weight="800">Step 2</text>
  <text x="655" y="2035" fill="#cbd5e1" font-size="26" font-family="Inter,Arial,sans-serif">Inject an anomaly at a chosen step.</text>
  <text x="1125" y="1988" fill="#e0f2fe" font-size="30" font-family="Inter,Arial,sans-serif" font-weight="800">Step 3</text>
  <text x="1125" y="2035" fill="#cbd5e1" font-size="26" font-family="Inter,Arial,sans-serif">Continue from the corrupted state so downstream consequences stay realistic.</text>
  <path d="M510 2010 L600 2010" stroke="#14b8a6" stroke-width="10" stroke-linecap="round"/>
  <path d="M980 2010 L1070 2010" stroke="#14b8a6" stroke-width="10" stroke-linecap="round"/>

  <rect x="110" y="2210" width="1380" height="90" rx="24" fill="url(#accent)" opacity="0.95"/>
  <text x="145" y="2265" fill="#ecfeff" font-size="31" font-family="Inter,Arial,sans-serif" font-weight="800">Bottom line:</text>
  <text x="360" y="2265" fill="#f8fafc" font-size="31" font-family="Inter,Arial,sans-serif">This repo's direct perturbation pipeline is useful, but TrajAD shows why realistic post-error continuation is the richer target.</text>
</svg>
