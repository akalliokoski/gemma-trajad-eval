<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="2400" viewBox="0 0 1600 2400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1600" height="2400" fill="url(#bg)"/>
  <rect x="70" y="60" width="1460" height="2280" rx="42" fill="#0b1220" opacity="0.45" stroke="#334155"/>

  <text x="110" y="150" fill="#93c5fd" font-size="34" font-family="Inter,Arial,sans-serif" font-weight="700">DATASET BUILDER • PHASE 0.1 • DOMAIN BACKGROUND</text>
  <text x="110" y="225" fill="#f8fafc" font-size="68" font-family="Inter,Arial,sans-serif" font-weight="800">TrajAD dataset construction and anomaly taxonomy</text>
  <text x="110" y="285" fill="#cbd5e1" font-size="30" font-family="Inter,Arial,sans-serif">Three anomaly classes, six perturbation families, and why perturb-and-complete raises the realism bar.</text>

  <rect x="110" y="340" width="1380" height="360" rx="28" fill="#111827" stroke="#1e293b" filter="url(#shadow)"/>
  <rect x="110" y="340" width="18" height="360" rx="9" fill="url(#accent)"/>
  <text x="150" y="410" fill="#67e8f9" font-size="28" font-family="Inter,Arial,sans-serif" font-weight="700">1. The three top-level anomaly classes</text>
  <rect x="150" y="460" width="390" height="180" rx="24" fill="#172554"/>
  <rect x="605" y="460" width="390" height="180" rx="24" fill="#0f766e"/>
  <rect x="1060" y="460" width="390" height="180" rx="24" fill="#7c2d12"/>
  <text x="185" y="525" fill="#dbeafe" font-size="38" font-family="Inter,Arial,sans-serif" font-weight="800">Task Failure</text>
  <text x="185" y="575" fill="#bfdbfe" font-size="26" font-family="Inter,Arial,sans-serif">Reasoning or execution breaks task success.</text>
  <text x="640" y="525" fill="#ccfbf1" font-size="38" font-family="Inter,Arial,sans-serif" font-weight="800">Process Inefficiency</text>
  <text x="640" y="575" fill="#99f6e4" font-size="26" font-family="Inter,Arial,sans-serif">Outcome may succeed, but the path is wasteful.</text>
  <text x="1095" y="525" fill="#ffedd5" font-size="38" font-family="Inter,Arial,sans-serif" font-weight="800">Unwarranted Continuation</text>
  <text x="1095" y="575" fill="#fed7aa" font-size="26" font-family="Inter,Arial,sans-serif">The agent keeps going when it should stop.</text>
  <text x="150" y="665" fill="#e2e8f0" font-size="27" font-family="Inter,Arial,sans-serif">Key idea: anomalies are not just failed final answers. They also include inefficient and over-continued trajectories.</text>

  <rect x="110" y="750" width="1380" height="520" rx="28" fill="#111827" stroke="#1e293b" filter="url(#shadow)"/>
  <text x="150" y="825" fill="#67e8f9" font-size="28" font-family="Inter,Arial,sans-serif" font-weight="700">2. TrajBench uses six perturbation families</text>
  <rect x="150" y="870" width="620" height="330" rx="24" fill="#0f172a" stroke="#334155"/>
  <rect x="830" y="870" width="620" height="330" rx="24" fill="#0f172a" stroke="#334155"/>
  <text x="190" y="930" fill="#f8fafc" font-size="40" font-family="Inter,Arial,sans-serif" font-weight="800">Task failure + inefficiency</text>
  <text x="190" y="995" fill="#cbd5e1" font-size="28" font-family="Inter,Arial,sans-serif">• Reasoning-error injection</text>
  <text x="190" y="1045" fill="#cbd5e1" font-size="28" font-family="Inter,Arial,sans-serif">• Execution-error injection</text>
  <text x="190" y="1095" fill="#cbd5e1" font-size="28" font-family="Inter,Arial,sans-serif">• Loop insertion</text>
  <text x="190" y="1145" fill="#cbd5e1" font-size="28" font-family="Inter,Arial,sans-serif">• Detour / redundant-subsequence insertion</text>
  <text x="870" y="930" fill="#f8fafc" font-size="40" font-family="Inter,Arial,sans-serif" font-weight="800">Unwarranted continuation</text>
  <text x="870" y="995" fill="#cbd5e1" font-size="28" font-family="Inter,Arial,sans-serif">• Failure-to-refuse setup</text>
  <text x="870" y="1045" fill="#cbd5e1" font-size="28" font-family="Inter,Arial,sans-serif">• Redundant-continuation setup</text>
  <rect x="150" y="1178" width="1300" height="52" rx="20" fill="#0b1220"/>
  <text x="190" y="1213" fill="#fcd34d" font-size="26" font-family="Inter,Arial,sans-serif" font-weight="700">Comparison:</text>
  <text x="365" y="1213" fill="#e2e8f0" font-size="26" font-family="Inter,Arial,sans-serif">TrajBench has 6 perturbation families; this repo currently implements 8 rules.</text>

  <rect x="110" y="1320" width="1380" height="470" rx="28" fill="#111827" stroke="#1e293b" filter="url(#shadow)"/>
  <text x="150" y="1395" fill="#67e8f9" font-size="28" font-family="Inter,Arial,sans-serif" font-weight="700">3. Why perturb-and-complete is richer than direct perturbation</text>
  <text x="150" y="1460" fill="#f8fafc" font-size="44" font-family="Inter,Arial,sans-serif" font-weight="800">Inject the error, then let the bad state propagate</text>
  <rect x="150" y="1510" width="360" height="170" rx="22" fill="#1e293b"/>
  <rect x="620" y="1510" width="360" height="170" rx="22" fill="#1e293b"/>
  <rect x="1090" y="1510" width="360" height="170" rx="22" fill="#1e293b"/>
  <text x="185" y="1570" fill="#e0f2fe" font-size="30" font-family="Inter,Arial,sans-serif" font-weight="800">1. Clean trajectory</text>
  <text x="185" y="1620" fill="#cbd5e1" font-size="26" font-family="Inter,Arial,sans-serif">Start from a successful agent run.</text>
  <text x="655" y="1570" fill="#e0f2fe" font-size="30" font-family="Inter,Arial,sans-serif" font-weight="800">2. Inject anomaly</text>
  <text x="655" y="1620" fill="#cbd5e1" font-size="26" font-family="Inter,Arial,sans-serif">Corrupt one step on purpose.</text>
  <text x="1125" y="1570" fill="#e0f2fe" font-size="30" font-family="Inter,Arial,sans-serif" font-weight="800">3. Complete forward</text>
  <text x="1125" y="1620" fill="#cbd5e1" font-size="26" font-family="Inter,Arial,sans-serif">Later steps reflect the consequences.</text>
  <path d="M510 1590 L600 1590" stroke="#14b8a6" stroke-width="10" stroke-linecap="round"/>
  <path d="M980 1590 L1070 1590" stroke="#14b8a6" stroke-width="10" stroke-linecap="round"/>
  <rect x="150" y="1710" width="1300" height="54" rx="18" fill="#0b1220"/>
  <text x="190" y="1745" fill="#e2e8f0" font-size="26" font-family="Inter,Arial,sans-serif">This repo's direct perturbation changes one step but leaves later steps fixed, which can create contradictions.</text>

  <rect x="110" y="1840" width="1380" height="330" rx="28" fill="#111827" stroke="#1e293b" filter="url(#shadow)"/>
  <text x="150" y="1915" fill="#67e8f9" font-size="28" font-family="Inter,Arial,sans-serif" font-weight="700">4. Human agreement = quality bar</text>
  <rect x="150" y="1965" width="520" height="140" rx="24" fill="#172554"/>
  <rect x="760" y="1965" width="520" height="140" rx="24" fill="#0f766e"/>
  <text x="190" y="2035" fill="#dbeafe" font-size="36" font-family="Inter,Arial,sans-serif" font-weight="800">96.2% classification agreement</text>
  <text x="800" y="2035" fill="#ccfbf1" font-size="36" font-family="Inter,Arial,sans-serif" font-weight="800">94.5% localization agreement</text>
  <text x="150" y="2135" fill="#e2e8f0" font-size="27" font-family="Inter,Arial,sans-serif">If later manual review in this repo feels ambiguous or inconsistent, the anomaly construction is probably not good enough yet.</text>

  <rect x="110" y="2210" width="1380" height="90" rx="24" fill="url(#accent)" opacity="0.95"/>
  <text x="145" y="2265" fill="#ecfeff" font-size="31" font-family="Inter,Arial,sans-serif" font-weight="800">Bottom line:</text>
  <text x="360" y="2265" fill="#f8fafc" font-size="31" font-family="Inter,Arial,sans-serif">Better anomaly datasets need both a clean taxonomy and believable downstream behavior after the first error.</text>
</svg>
