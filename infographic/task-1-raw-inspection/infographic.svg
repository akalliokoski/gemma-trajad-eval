<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1320"/>
      <stop offset="100%" stop-color="#102a43"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="40" y="40" width="1520" height="820" rx="28" fill="none" stroke="#52d1ff" stroke-width="2" stroke-dasharray="10 10" opacity="0.55"/>
  <text x="80" y="100" fill="#9fd9ff" font-size="24" font-family="Arial, Helvetica, sans-serif" letter-spacing="4">GEMMA-TRAJAD-EVAL / IMPLEMENTATION INFOGRAPHIC</text>
  <text x="80" y="155" fill="#ffffff" font-size="44" font-weight="700" font-family="Arial, Helvetica, sans-serif">Task 1 — Raw Trace Inspection Repair</text>
  <text x="80" y="198" fill="#c8e8ff" font-size="23" font-family="Arial, Helvetica, sans-serif">Repair dataset_builder/inspect_traces.py so it works on real ShareGPT-style Hermes traces and surfaces trust-building inspection metrics.</text>

  <g filter="url(#shadow)">
    <rect x="80" y="250" width="430" height="260" rx="24" fill="#102f4a" stroke="#63d8ff" stroke-width="2"/>
    <rect x="535" y="250" width="430" height="260" rx="24" fill="#102f4a" stroke="#63d8ff" stroke-width="2"/>
    <rect x="990" y="250" width="530" height="260" rx="24" fill="#102f4a" stroke="#63d8ff" stroke-width="2"/>
    <rect x="80" y="535" width="885" height="250" rx="24" fill="#102f4a" stroke="#63d8ff" stroke-width="2"/>
    <rect x="990" y="535" width="530" height="250" rx="24" fill="#102f4a" stroke="#63d8ff" stroke-width="2"/>
  </g>

  <text x="110" y="295" fill="#7fe8ff" font-size="24" font-weight="700" font-family="Arial, Helvetica, sans-serif">PROBLEM / MOTIVATION</text>
  <text x="110" y="340" fill="#e7f6ff" font-size="24" font-family="Arial, Helvetica, sans-serif">• Real raw traces used from/value.</text>
  <text x="110" y="374" fill="#e7f6ff" font-size="24" font-family="Arial, Helvetica, sans-serif">• Inspection path assumed role/content.</text>
  <text x="110" y="408" fill="#e7f6ff" font-size="24" font-family="Arial, Helvetica, sans-serif">• A broken inspection script weakens all later decisions.</text>

  <text x="565" y="295" fill="#7fe8ff" font-size="24" font-weight="700" font-family="Arial, Helvetica, sans-serif">IMPLEMENTATION</text>
  <text x="565" y="340" fill="#e7f6ff" font-size="24" font-family="Arial, Helvetica, sans-serif">• Added get_role(msg) and get_content(msg).</text>
  <text x="565" y="374" fill="#e7f6ff" font-size="24" font-family="Arial, Helvetica, sans-serif">• Reused helpers in count_roles, print_summary, print_sample.</text>
  <text x="565" y="408" fill="#e7f6ff" font-size="24" font-family="Arial, Helvetica, sans-serif">• Added trace-level tool-call and pair-rate metrics.</text>

  <text x="1020" y="295" fill="#7fe8ff" font-size="24" font-weight="700" font-family="Arial, Helvetica, sans-serif">VERIFICATION METRICS</text>
  <g>
      <rect x="1020" y="330" width="235" height="92" rx="18" fill="#0b2338" stroke="#75e2ff" stroke-width="2"/>
      <text x="1038" y="364" fill="#88e8ff" font-size="18" font-family="Arial, Helvetica, sans-serif">Tests passed</text>
      <text x="1038" y="400" fill="#ffffff" font-size="30" font-weight="700" font-family="Arial, Helvetica, sans-serif">5</text>
    </g>
  <g>
      <rect x="1285" y="330" width="235" height="92" rx="18" fill="#0b2338" stroke="#75e2ff" stroke-width="2"/>
      <text x="1303" y="364" fill="#88e8ff" font-size="18" font-family="Arial, Helvetica, sans-serif">Raw records</text>
      <text x="1303" y="400" fill="#ffffff" font-size="30" font-weight="700" font-family="Arial, Helvetica, sans-serif">3,679</text>
    </g>
  <g>
      <rect x="1020" y="445" width="235" height="92" rx="18" fill="#0b2338" stroke="#75e2ff" stroke-width="2"/>
      <text x="1038" y="479" fill="#88e8ff" font-size="18" font-family="Arial, Helvetica, sans-serif">&gt;=1 tool call</text>
      <text x="1038" y="515" fill="#ffffff" font-size="30" font-weight="700" font-family="Arial, Helvetica, sans-serif">100.0%</text>
    </g>
  <g>
      <rect x="1285" y="445" width="235" height="92" rx="18" fill="#0b2338" stroke="#75e2ff" stroke-width="2"/>
      <text x="1303" y="479" fill="#88e8ff" font-size="18" font-family="Arial, Helvetica, sans-serif">&gt;=2 pairs</text>
      <text x="1303" y="515" fill="#ffffff" font-size="30" font-weight="700" font-family="Arial, Helvetica, sans-serif">99.4%</text>
    </g>

  <text x="110" y="580" fill="#7fe8ff" font-size="24" font-weight="700" font-family="Arial, Helvetica, sans-serif">COMMANDS / FILES</text>
  <text x="110" y="625" fill="#e7f6ff" font-size="20" font-family="Arial, Helvetica, sans-serif">• PYTHONPATH=. uv run --with pytest --no-project pytest tests/test_inspect_traces.py -v</text>
  <text x="110" y="667" fill="#e7f6ff" font-size="20" font-family="Arial, Helvetica, sans-serif">• python3 dataset_builder/inspect_traces.py data/raw/hermes_filtered.jsonl</text>
  <text x="110" y="709" fill="#e7f6ff" font-size="20" font-family="Arial, Helvetica, sans-serif">• Files: dataset_builder/inspect_traces.py, tests/test_inspect_traces.py</text>

  <text x="1020" y="580" fill="#7fe8ff" font-size="24" font-weight="700" font-family="Arial, Helvetica, sans-serif">KEY TAKEAWAY</text>
  <text x="1020" y="635" fill="#e7f6ff" font-size="24" font-family="Arial, Helvetica, sans-serif">• Task 1 makes inspection trustworthy on the actual Hermes raw dataset.</text>
  <text x="1020" y="677" fill="#e7f6ff" font-size="24" font-family="Arial, Helvetica, sans-serif">• The fix stayed small, schema-safe, and directly measurable.</text>
</svg>
